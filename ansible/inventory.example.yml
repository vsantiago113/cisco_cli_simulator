---
all:
  children:
    cisco_devices:
      hosts:
        switch1:
          ansible_host: 10.99.0.21
          ansible_user: admin
          ansible_password: "{{ lookup('env', 'ANSIBLE_NET_PASSWORD') }}"
          ansible_network_os: cisco.ios.ios
          ansible_connection: ansible.netcommon.network_cli
          ansible_become: true
          ansible_become_method: enable
          ansible_become_password: "{{ lookup('env', 'ANSIBLE_ENABLE_PASSWORD') | default(lookup('env', 'ANSIBLE_NET_PASSWORD'), true) }}"

        router1:
          ansible_host: 10.255.0.1
          ansible_user: admin
          ansible_password: "{{ lookup('env', 'ANSIBLE_NET_PASSWORD') }}"
          ansible_network_os: cisco.ios.ios
          ansible_connection: ansible.netcommon.network_cli
          ansible_become: true
          ansible_become_method: enable
          ansible_become_password: "{{ lookup('env', 'ANSIBLE_ENABLE_PASSWORD') | default(lookup('env', 'ANSIBLE_NET_PASSWORD'), true) }}"
